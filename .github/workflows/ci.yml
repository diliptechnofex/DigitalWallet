on:

pull_request:
	branches:
		- master
		- development
push:
	branches:
		- master
		- development
concurrecy:
	group: ci-${{github.ref}}
	cancel-in-progress: true

permission:
	contents: read
	checks: write
	pull-requests: write

env:
	DOTNET_NOLOGO: true
	DOTNET_CLI_TELEMETRY_OPTOUT: true
	NUGET_PACKAGES:${{githug.workspace}}/.nuget/packages
	SOLUTION_FILE: DigitalWallet.slnx
	CONFIGURATION: Release
jobs:
	build-and-test:
		name: Build and test
		runs-on: ubuntu-latest

	timeout-minutes: 20
	
	steps:
		- name: Checkout source code
		  uses: actions/checkout@v6
	
		- name: Setup .NET SDK
		  uses: actions/setup-dotnet@v5
	          with:
		  	global-json-file: ./global.json
		  	cache: true
		  	cache-dependency-path: | **/packages.lock.json
		
		- name: Display .NET information
		  run: dotnet --info

		- name: Restore NuGet packages
		  run: dotnet restore ${{env.SOLUTION_FILE}} --locked-mode
	
		- name: Build solution
		  run: dotnet build ${{env.SOLUTION_FILE}} --configuration 			            ${{ env.CONFIGURATION }} --no-restore
		
		- name: Run tests
		  run: >
		       dotnet test ${{env.SOLTION_FILE}}
		       --configuration ${{ env.CONFIGURATION }}
		       --no-build
		       --logger "trx:LogFileName=test-results.trx"
	   	       --results-directory ./TestResults
		
		 - name: Upload test results
        	   if: always()
                   uses: actions/upload-artifact@v4
                   with:
          		name: test-results
          		path: ./TestResults
          		if-no-files-found: ignore



